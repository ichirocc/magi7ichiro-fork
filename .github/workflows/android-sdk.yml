name: Android SDK

on:
  workflow_dispatch:
    inputs:
      upload_apk:
        description: "Upload built APKs as artifacts (may hit storage quota)"
        type: boolean
        default: false
  push:
    branches: [ main ]

jobs:
  android-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "platforms;android-36" "build-tools;35.0.0" "build-tools;36.0.0"

      - name: Install Gradle 9.3.1
        shell: bash
        run: |
          wget -q -O /tmp/gradle.zip https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
          mkdir -p "$HOME/gradle-dist"
          unzip -q /tmp/gradle.zip -d "$HOME/gradle-dist"
          echo "$HOME/gradle-dist/gradle-9.3.1/bin" >> "$GITHUB_PATH"

      - name: Show Android SDK versions
        run: sdkmanager --list_installed || true

      - name: Show Gradle CLI
        run: gradle --version

      - name: Build debug and release APKs
        shell: bash
        run: |
          set +e
          gradle assembleDebug assembleRelease --stacktrace > build-debug.log 2>&1
          code=$?
          cat build-debug.log
          echo "$code" > build-exit-code.txt

      - name: Show build error summary
        if: ${{ always() }}
        shell: bash
        run: |
          echo "===== Build error summary ====="
          grep -n -E "(^e:|error:|FAILURE:|What went wrong|Unresolved reference|Compilation error|Execution failed|command not found)" build-debug.log | head -120 || true
          echo "===== '* What went wrong:' block (incl. lint findings) ====="
          awk '/\* What went wrong:/{f=1} f{print} /^\* Try:/{f=0}' build-debug.log | head -120 || true
          echo "===== Last 120 log lines ====="
          tail -120 build-debug.log || true

      # ログ／lint のアップロードはベストエフォート（GitHub のストレージ枠超過などで赤くしない）。
      # APK のアップロードは容量が大きく枠超過の注記を出しやすいため、既定ではスキップし、
      # 手動実行（workflow_dispatch）で upload_apk=true を指定したときのみ実行する。
      # ビルドの成否は最後の "Fail if build failed" で判定する。
      # 成功時の常時アップロードはストレージ枠を浪費するため、ログは失敗時のみ・短期保持。
      - name: Upload build log (on failure only)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        if: ${{ failure() }}
        with:
          name: build-debug-log
          path: build-debug.log
          retention-days: 7

      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        continue-on-error: true
        if: ${{ always() && hashFiles('**/build/reports/lint-results-*.*') != '' }}
        with:
          name: lint-reports
          path: "**/build/reports/lint-results-*.*"
          retention-days: 7

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        continue-on-error: true
        if: ${{ always() && github.event.inputs.upload_apk == 'true' && hashFiles('**/build/outputs/apk/debug/**/*.apk') != '' }}
        with:
          name: android-debug-apk
          path: "**/build/outputs/apk/debug/**/*.apk"
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        continue-on-error: true
        if: ${{ always() && github.event.inputs.upload_apk == 'true' && hashFiles('**/build/outputs/apk/release/**/*.apk') != '' }}
        with:
          name: android-release-apk
          path: "**/build/outputs/apk/release/**/*.apk"
          retention-days: 7

      - name: Upload any APK fallback
        uses: actions/upload-artifact@v4
        continue-on-error: true
        if: ${{ always() && github.event.inputs.upload_apk == 'true' && hashFiles('**/build/outputs/apk/**/*.apk') != '' }}
        with:
          name: android-apk-all
          path: "**/build/outputs/apk/**/*.apk"
          retention-days: 7

      - name: Fail if build failed
        shell: bash
        run: |
          code="$(cat build-exit-code.txt)"
          if [ "$code" != "0" ]; then
            echo "===== Build failed. Open this red step for the summary. ====="
            grep -n -E "(^e:|error:|FAILURE:|What went wrong|Unresolved reference|Compilation error|Execution failed|command not found)" build-debug.log | head -120 || true
            echo "===== '* What went wrong:' block (incl. lint findings) ====="
            awk '/\* What went wrong:/{f=1} f{print} /^\* Try:/{f=0}' build-debug.log | head -120 || true
            echo "===== Last 120 log lines ====="
            tail -120 build-debug.log || true
          fi
          exit "$code"
